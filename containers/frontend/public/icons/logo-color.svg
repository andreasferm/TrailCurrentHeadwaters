<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <!-- Overlook icon scaled from tc_overlook.svg (512x512 → 36x36) -->
  <g transform="translate(4, 6) scale(0.0703125)">
    <!-- Mountain range -->
    <polygon points="30,400 140,260 220,330 300,200 440,400" fill="#52a441"/>
    <!-- Snow cap -->
    <polygon points="300,200 275,240 325,240" fill="white"/>
    <!-- Viewing rail / platform -->
    <rect x="30" y="400" width="452" height="14" rx="4" fill="#52a441"/>
    <!-- Binoculars -->
    <circle cx="186" cy="110" r="60" fill="none" stroke="#52a441" stroke-width="18"/>
    <circle cx="326" cy="110" r="60" fill="none" stroke="#52a441" stroke-width="18"/>
    <!-- Bridge -->
    <rect x="234" y="98" width="44" height="24" rx="8" fill="#52a441"/>
  </g>

  <!-- Text: Overlook -->
  <text x="46" y="33" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#52a441">
    <tspan>Over</tspan><tspan fill="#2d5a25">look</tspan>
  </text>
</svg>
