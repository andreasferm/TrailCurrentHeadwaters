<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Overlook app icon: green rounded-rect background with mountain/binoculars -->
  <rect width="192" height="192" rx="24" fill="#52a441"/>
  <!-- Mountain range -->
  <polygon points="24,148 56,100 76,120 100,76 148,148" fill="#3d7d31"/>
  <!-- Snow cap -->
  <polygon points="100,76 93,90 107,90" fill="white" opacity="0.7"/>
  <!-- Viewing rail -->
  <rect x="24" y="148" width="144" height="5" rx="2" fill="#3d7d31"/>
  <!-- Binoculars -->
  <circle cx="72" cy="48" r="20" fill="none" stroke="white" stroke-width="6"/>
  <circle cx="120" cy="48" r="20" fill="none" stroke="white" stroke-width="6"/>
  <!-- Bridge between binoculars -->
  <rect x="88" y="44" width="16" height="8" rx="3" fill="white"/>
</svg>
