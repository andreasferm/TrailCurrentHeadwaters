<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Overlook maskable icon: full bleed green background, content in 80% safe zone -->
  <rect width="512" height="512" fill="#52a441"/>
  <!-- Content scaled to fit within ~410px centered (80% safe zone) -->
  <g transform="translate(256, 266) scale(0.6) translate(-256, -256)">
    <!-- Mountain range -->
    <polygon points="60,400 140,260 200,320 280,190 420,400" fill="#3d7d31"/>
    <!-- Snow cap -->
    <polygon points="280,190 260,230 300,230" fill="white" opacity="0.7"/>
    <!-- Viewing rail -->
    <rect x="60" y="400" width="380" height="14" rx="4" fill="#3d7d31"/>
    <!-- Binoculars -->
    <circle cx="186" cy="110" r="55" fill="none" stroke="white" stroke-width="18"/>
    <circle cx="326" cy="110" r="55" fill="none" stroke="white" stroke-width="18"/>
    <!-- Bridge -->
    <rect x="234" y="98" width="44" height="24" rx="8" fill="white"/>
  </g>
</svg>
