# METABEGIN
# X-Env-Layer-Name: trailcurrent-base
# X-Env-Layer-Category: app
# X-Env-Layer-Desc: TrailCurrent in-vehicle compute base system
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Requires: bookworm-minbase,rpi-user-credentials,systemd-net-min
# X-Env-Layer-Provides: trailcurrent-base
# METAEND
---
mmdebstrap:
  packages:
    - jq
    - openssl
    - python3
    - python3-venv
    - python3-pip
    - iproute2
    - can-utils
    - avahi-daemon
    - avahi-utils
    - libnss-mdns
    - curl
    - unzip
    - nvme-cli
    - parted
    - cloud-guest-utils

  customize-hooks:
    # ── Docker CE from official repo ─────────────────────────────────
    - |
      mkdir -p "$1/etc/apt/keyrings"
      curl -fsSL https://download.docker.com/linux/debian/gpg \
        | gpg --dearmor -o "$1/etc/apt/keyrings/docker.gpg"
      chmod a+r "$1/etc/apt/keyrings/docker.gpg"
      echo "deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable" \
        > "$1/etc/apt/sources.list.d/docker.list"
      chroot "$1" apt-get update
      chroot "$1" apt-get install -y --no-install-recommends \
        docker-ce docker-ce-cli containerd.io docker-compose-plugin

    # ── Docker: log rotation config ──────────────────────────────────
    - |
      mkdir -p "$1/etc/docker"
      cat > "$1/etc/docker/daemon.json" << 'EOF'
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
      EOF

    # ── config.txt: CAN bus + power savings ──────────────────────────
    - |
      cat >> "$1/boot/firmware/config.txt" << 'CFGEOF'

      # ── CAN bus (MCP2515 on SPI0/CE0, 16MHz xtal, GPIO25 INT) ──
      dtparam=spi=on
      dtoverlay=mcp2515-can0,oscillator=16000000,interrupt=25,spimaxfrequency=1000000

      # ── Power savings: disable unused peripherals ──
      dtoverlay=disable-bt
      dtoverlay=disable-wifi
      dtoverlay=disable-hdmi0
      dtoverlay=disable-hdmi1
      dtparam=audio=off
      dtparam=act_led_trigger=none
      dtparam=act_led_activelow=off
      gpu_mem=16

      # ── Underclock to 600 MHz (ample for Mosquitto/MongoDB/backend workload) ──
      arm_freq=600

      # ── I2C (required for Waveshare CM5 active cooler fan controller) ──
      dtparam=i2c_arm=on

      # ── Active cooler: multi-step fan ramp for enclosed operation ──
      dtparam=cooling_fan
      dtparam=fan_temp0=45000,fan_temp0_hyst=5000,fan_temp0_speed=75
      dtparam=fan_temp1=55000,fan_temp1_hyst=5000,fan_temp1_speed=150
      dtparam=fan_temp2=65000,fan_temp2_hyst=5000,fan_temp2_speed=255
      CFGEOF

    # ── can0 systemd service ─────────────────────────────────────────
    - |
      cat > "$1/etc/systemd/system/can0.service" << 'EOF'
      [Unit]
      Description=CAN bus interface can0
      Requires=sys-subsystem-net-devices-can0.device
      After=sys-subsystem-net-devices-can0.device

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      # Delay for MCP2515 crystal oscillator to stabilize after power-on
      ExecStartPre=/bin/sleep 15
      ExecStart=/sbin/ip link set can0 type can bitrate 500000
      ExecStart=/sbin/ip link set can0 up
      ExecStop=/sbin/ip link set can0 down
      Restart=on-failure
      RestartSec=10
      TimeoutStartSec=30

      [Install]
      WantedBy=multi-user.target
      EOF

    # ── disable-usb systemd service (save power) ────────────────────
    - |
      cat > "$1/etc/systemd/system/disable-usb.service" << 'EOF'
      [Unit]
      Description=Disable USB hub to save power
      After=multi-user.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/bin/bash -c 'for port in /sys/bus/usb/devices/[0-9]-[0-9]; do [ -e "$port/driver" ] && echo "$(basename $port)" > /sys/bus/usb/drivers/usb/unbind || true; done'

      [Install]
      WantedBy=multi-user.target
      EOF

    # ── Bake deployment artifacts into image ──────────────────────────
    #
    # These files are normally delivered via deploy.sh, but baking them
    # into the image means a freshly flashed NVMe is ready to run after
    # the user completes the first-login setup wizard.
    #
    # Prerequisites (must exist before running build.sh):
    #   - images/*.tar        (Docker image tarballs from build-and-save-images.sh)
    #   - data/tileserver/map.mbtiles  (map tile data)
    #
    - |
      TC_HOME="$1/home/$IGconf_device_user1"
      REPO_ROOT="$SRCROOT/../.."

      # docker-compose.yml (service orchestration)
      install -m 644 -o 1000 -g 1000 "$REPO_ROOT/docker-compose.yml" "$TC_HOME/docker-compose.yml"

      # .env.example (template for reference)
      install -m 644 -o 1000 -g 1000 "$REPO_ROOT/.env.example" "$TC_HOME/.env.example"

      # config/ (mosquitto)
      mkdir -p "$TC_HOME/config"
      cp -r "$REPO_ROOT/config/mosquitto" "$TC_HOME/config/"
      chown -R 1000:1000 "$TC_HOME/config"

      # scripts/ (cert generation)
      mkdir -p "$TC_HOME/scripts"
      install -m 755 -o 1000 -g 1000 "$REPO_ROOT/scripts/generate-certs.sh" "$TC_HOME/scripts/generate-certs.sh"
      install -m 644 -o 1000 -g 1000 "$REPO_ROOT/scripts/openssl.cnf" "$TC_HOME/scripts/openssl.cnf"

      # local_code/ (Python scripts, systemd units, requirements)
      mkdir -p "$TC_HOME/local_code"
      chown 1000:1000 "$TC_HOME/local_code"
      for f in "$REPO_ROOT"/local_code/*.py "$REPO_ROOT"/local_code/*.service "$REPO_ROOT"/local_code/requirements.txt; do
        [ -f "$f" ] && install -m 644 -o 1000 -g 1000 "$f" "$TC_HOME/local_code/"
      done


      # deploy.sh (for future OTA deployments)
      install -m 755 -o 1000 -g 1000 "$REPO_ROOT/deploy.sh" "$TC_HOME/deploy.sh"

      # Docker image tarballs (loaded by firstboot, then deleted)
      mkdir -p "$TC_HOME/images"
      if ls "$REPO_ROOT"/images/*.tar 1>/dev/null 2>&1; then
        cp "$REPO_ROOT"/images/*.tar "$TC_HOME/images/"
        chown -R 1000:1000 "$TC_HOME/images"
      else
        echo "WARNING: No Docker image tarballs found at images/*.tar"
        echo "Run ./build-and-save-images.sh before building the CM5 image."
      fi

      # data/tileserver/map.mbtiles (map tile data, ~25GB)
      mkdir -p "$TC_HOME/data/tileserver"
      if [ -f "$REPO_ROOT/data/tileserver/map.mbtiles" ]; then
        cp "$REPO_ROOT/data/tileserver/map.mbtiles" "$TC_HOME/data/tileserver/map.mbtiles"
        chown 1000:1000 "$TC_HOME/data/tileserver/map.mbtiles"
      else
        echo "WARNING: map.mbtiles not found at data/tileserver/map.mbtiles"
        echo "The tileserver will not start without this file."
      fi

      # data/keys/ directory (populated by firstboot)
      mkdir -p "$TC_HOME/data/keys"
      chown -R 1000:1000 "$TC_HOME/data"

    # ── First-login setup script + bash_profile hook ───────────────────
    - install -m 755 "$SRCROOT/layer/files/trailcurrent-first-login.sh" "$1/usr/local/bin/trailcurrent-first-login.sh"
    - |
      TC_HOME="$1/home/$IGconf_device_user1"
      cat >> "$TC_HOME/.bash_profile" << 'BPEOF'

      # Run first-login setup if .env has not been created yet
      if [ ! -f "$HOME/.env" ] && [ -t 0 ]; then
          /usr/local/bin/trailcurrent-first-login.sh
      fi
      BPEOF
      chown 1000:1000 "$TC_HOME/.bash_profile"

    # ── First-boot service (NVMe, EEPROM, TLS certs, venv) ─────────────
    - install -m 755 "$SRCROOT/layer/files/trailcurrent-firstboot.sh" "$1/usr/local/bin/trailcurrent-firstboot.sh"
    - |
      cat > "$1/etc/systemd/system/trailcurrent-firstboot.service" << 'EOF'
      [Unit]
      Description=TrailCurrent first-boot setup (NVMe, EEPROM, TLS, venv, Docker images)
      Before=docker.service
      After=network-online.target
      Wants=network-online.target
      ConditionPathExists=!/var/lib/trailcurrent/.firstboot-done

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/trailcurrent-firstboot.sh
      ExecStartPost=/bin/mkdir -p /var/lib/trailcurrent
      ExecStartPost=/bin/touch /var/lib/trailcurrent/.firstboot-done
      RemainAfterExit=yes
      TimeoutStartSec=300
      StandardOutput=journal+console

      [Install]
      WantedBy=multi-user.target
      EOF

    # ── Docker image loader service (runs once after Docker starts) ───
    - install -m 755 "$SRCROOT/layer/files/trailcurrent-load-images.sh" "$1/usr/local/bin/trailcurrent-load-images.sh"
    - |
      cat > "$1/etc/systemd/system/trailcurrent-load-images.service" << EOF
      [Unit]
      Description=Load baked-in Docker images from tarballs
      After=docker.service trailcurrent-firstboot.service
      Requires=docker.service
      ConditionPathExists=/home/$IGconf_device_user1/images
      ConditionDirectoryNotEmpty=/home/$IGconf_device_user1/images

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/trailcurrent-load-images.sh
      RemainAfterExit=yes
      TimeoutStartSec=600
      StandardOutput=journal+console

      [Install]
      WantedBy=multi-user.target
      EOF

    # ── cantomqtt systemd service (starts after deployment provides code) ──
    - |
      cat > "$1/etc/systemd/system/cantomqtt.service" << SVCEOF
      [Unit]
      Description=CAN Bus to MQTT Service
      After=docker.service can0.service
      Requires=docker.service can0.service
      # Only start if deployment has provided the code
      ConditionPathExists=/home/$IGconf_device_user1/local_code/can-to-mqtt.py

      [Service]
      Type=simple
      User=$IGconf_device_user1
      WorkingDirectory=/home/$IGconf_device_user1/local_code
      EnvironmentFile=/home/$IGconf_device_user1/local_code/.env
      ExecStart=/home/$IGconf_device_user1/local_code/cantomqtt/bin/python /home/$IGconf_device_user1/local_code/can-to-mqtt.py
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
      SVCEOF

    # ── deployment-watcher systemd service ───────────────────────────
    - |
      cat > "$1/etc/systemd/system/deployment-watcher.service" << SVCEOF
      [Unit]
      Description=TrailCurrent Deployment Watcher
      After=docker.service network-online.target
      Requires=docker.service
      Wants=network-online.target
      # Only start if deployment has provided the code
      ConditionPathExists=/home/$IGconf_device_user1/local_code/deployment-watcher.py

      [Service]
      Type=simple
      User=$IGconf_device_user1
      WorkingDirectory=/home/$IGconf_device_user1/local_code
      EnvironmentFile=/home/$IGconf_device_user1/local_code/.env
      ExecStart=/home/$IGconf_device_user1/local_code/cantomqtt/bin/python /home/$IGconf_device_user1/local_code/deployment-watcher.py
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
      SVCEOF

    # ── discovery-mdns systemd service ────────────────────────────────
    - |
      cat > "$1/etc/systemd/system/discovery-mdns.service" << SVCEOF
      [Unit]
      Description=TrailCurrent mDNS Discovery Browser
      After=docker.service
      Requires=docker.service
      ConditionPathExists=/home/$IGconf_device_user1/local_code/discovery-mdns.py

      [Service]
      Type=simple
      User=$IGconf_device_user1
      WorkingDirectory=/home/$IGconf_device_user1/local_code
      EnvironmentFile=/home/$IGconf_device_user1/local_code/.env
      Environment=PYTHONUNBUFFERED=1
      ExecStart=/home/$IGconf_device_user1/local_code/cantomqtt/bin/python /home/$IGconf_device_user1/local_code/discovery-mdns.py
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
      SVCEOF

    # ── Console login banner (MOTD) ───────────────────────────────────
    - install -m 644 "$SRCROOT/layer/files/motd" "$1/etc/motd"

    # ── Enable all services ──────────────────────────────────────────
    - $BDEBSTRAP_HOOKS/enable-units "$1" can0 disable-usb docker trailcurrent-firstboot trailcurrent-load-images cantomqtt discovery-mdns deployment-watcher

    # ── Add default user to docker group ─────────────────────────────
    - chroot "$1" usermod -aG docker "$IGconf_device_user1"

  cleanup-hooks:
    # Remove apt caches to shrink the image
    - chroot "$1" apt-get clean
    - rm -rf "$1/var/lib/apt/lists/"*
