# TrailCurrent CM5 Base Image Configuration
#
# Builds a headless Raspberry Pi OS Lite image for the Compute Module 5
# with all base system dependencies pre-configured:
#   - Docker CE + Compose plugin
#   - CAN bus (MCP2515 on SPI0/CE0)
#   - Power optimizations (underclocked, unused peripherals disabled)
#   - System packages for TrailCurrent runtime
#   - First-boot service for per-device setup (partition expansion, EEPROM, TLS certs, venv)
#
# Storage layout:
#   NVMe (/) -> Everything: OS, packages, Docker, app data
#   Root partition is expanded to fill the NVMe on first boot.
#
# Supports both CM5 (with eMMC, ignored) and CM5 Lite (no eMMC).
#
# Does NOT include the application stack (containers, Node-RED flows, etc.)
# Those are deployed separately via deploy.sh.

include:
  file: bookworm-minbase.yaml

device:
  layer: rpi-cm5
  hostname: headwaters

image:
  name: trailcurrent-cm5-base
  boot_part_size: 200%
  # Image includes ~25GB map tiles + ~1GB Docker images. Keep the image
  # compact (10% headroom) — first-boot expands root to fill the NVMe.
  root_part_size: 110%

layer:
  base: trailcurrent-base
  splash: rpi-splash-screen

# Boot splash screen — replaces Raspberry Pi logo with TrailCurrent branding.
# Generate the TGA file first:  cd CM5/image && ./generate-splash.sh
splash:
  image_path: splash/trailcurrent-splash.tga
  skip_image_checks: n
  update_cmdline: y
