# TrailCurrent Headwaters — kernel tuning

# Reduce swap pressure
vm.swappiness = 10

# Reduce filesystem dirty page writebacks (less I/O contention for MongoDB)
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5

# Increase inotify limits (tileserver + Docker watchers)
fs.inotify.max_user_watches = 65536

# Reduce kernel log verbosity (clean console at boot)
kernel.printk = 4 4 1 7
