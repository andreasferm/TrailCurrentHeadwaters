# TrailCurrent Headwaters — Q6A unused subsystem blacklist
#
# The Headwaters workload only needs: Ethernet, USB, NVMe, SPI (CAN HAT),
# I2C, and GPIO. Everything below is blacklisted to prevent its driver from
# loading at boot so it draws zero idle power.
#
# Grouped so future edits can re-enable a subsystem by commenting out a
# single section.

# ── WiFi ────────────────────────────────────────────────────────────────────
blacklist ath10k_core
blacklist ath10k_pci
blacklist ath10k_snoc
blacklist ath11k
blacklist ath11k_pci
blacklist ath
blacklist cfg80211
blacklist mac80211

# ── Bluetooth ───────────────────────────────────────────────────────────────
blacklist bluetooth
blacklist btqca
blacklist btbcm
blacklist hci_uart
blacklist btusb

# ── NPU (Hexagon DSP / FastRPC) ─────────────────────────────────────────────
# The QCS6490 NPU is unused by Headwaters. We disable user-space (fastrpc,
# libcdsprpc1 not installed) AND block the kernel drivers so the cDSP / aDSP
# remoteproc firmware never loads. Power-save-hw.service also stops the
# remoteproc instances at runtime in case the drivers get probed anyway.
blacklist fastrpc
blacklist qcom_fastrpc
blacklist qcom_q6v5_pas
blacklist qcom_pil_info
blacklist qcom_q6v5

# ── Display (DPU / DSI / DP) ────────────────────────────────────────────────
blacklist msm
blacklist msm_dsi
blacklist msm_dp
blacklist msm_mdss
blacklist drm_kms_helper

# ── Camera (CAMSS, IFE, ISP) ────────────────────────────────────────────────
blacklist camss
blacklist qcom_camss

# ── Audio (Q6 ASM/ADM, audioreach) ──────────────────────────────────────────
blacklist snd_soc_qcom_common
blacklist snd_soc_sm8250
blacklist snd_soc_sc7280
blacklist q6asm_dai
blacklist q6adm
blacklist q6afe
blacklist q6core
blacklist q6routing
blacklist audioreach
