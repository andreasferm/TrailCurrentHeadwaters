# TrailCurrent - Headwaters chrony configuration
#
# Headwaters is the LAN NTP server for the vehicle network and a client
# of the public NTP pools when internet is reachable. When the vehicle
# is rolling without internet, the time-from-bearing.service feeds
# Bearing's GNSS UTC time into the system clock so chronyd has a
# correct starting point.

# Upstream NTP pool - used when internet is reachable.
pool 2.debian.pool.ntp.org iburst maxsources 4

# Allow LAN clients to query us. Covers RFC1918 / private use space so
# the vehicle network can be on 192.168.x.x, 10.x.x.x or 172.16-31.x.x.
allow 192.168.0.0/16
allow 10.0.0.0/8
allow 172.16.0.0/12

# Serve from the local clock when no upstream pool is reachable. Stratum 10
# loses to any real internet source if one appears, but stops LAN clients
# from getting "unsynchronised" errors when we're rolling without internet.
local stratum 10

# Step the clock instead of slewing when the offset is > 1 second, but only
# for the first 3 updates after startup. Matches the boot-with-stale-RTC
# case: take one immediate jump, then slew from there.
makestep 1.0 3

# Keep the kernel RTC (CM5 onboard RTC at /dev/rtc0) in sync with the
# system clock. The kernel writes back every ~11 minutes. Combined with
# the battery on the CM5 RTC pad, this preserves time across power-off.
rtcsync

# Save the measured drift so we converge faster across reboots.
driftfile /var/lib/chrony/chrony.drift

# Logs
logdir /var/log/chrony
